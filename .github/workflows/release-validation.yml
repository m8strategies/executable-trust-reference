name: Release validation

# The gate that must FAIL while publication metadata is unresolved.
#
# Ordinary CI passing is not evidence that this artifact is publishable.
# This workflow is what prevents an incomplete artifact being tagged,
# archived, or cited.
#
# It is intentionally NOT part of the pull-request checks: the repository's
# normal working state has unresolved placeholders, and a permanently red
# required check trains people to ignore red checks.

on:
  workflow_dispatch:
    inputs:
      require_doi:
        description: >-
          Also require ARCHIVE_DOI to be resolved. Use only AFTER archiving a
          release, since a DOI is minted once a release exists.
        type: boolean
        default: false
  push:
    tags: ["v*"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-gate:
    name: Publication readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      # --- Boundary first: a leak must block a release even if everything
      # --- else is complete.
      - name: Publication boundary
        run: python scripts/validate_publication_boundary.py

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Contracts and schemas
        run: python scripts/validate_contracts.py

      - name: Traceability
        run: python scripts/validate_traceability.py

      - name: Full test suite
        run: pytest --cov=executable_trust --cov-fail-under=90

      - name: Baseline reports are current
        run: python evaluation/run_baseline.py --check

      # --- The gate proper: placeholders, citation metadata, paper references,
      # --- baseline freshness, licence decision.
      - name: Release metadata
        run: |
          if [ "${{ inputs.require_doi }}" = "true" ]; then
            python scripts/validate_release_metadata.py --require-doi
          else
            python scripts/validate_release_metadata.py
          fi

      - name: Summary
        if: success()
        run: |
          echo "### Release validation passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Placeholders resolved, citation metadata complete, paper" >> "$GITHUB_STEP_SUMMARY"
          echo "references resolve, baseline current, licence decision" >> "$GITHUB_STEP_SUMMARY"
          echo "recorded, publication boundary intact." >> "$GITHUB_STEP_SUMMARY"

      - name: Failure guidance
        if: failure()
        run: |
          {
            echo "### Release validation failed"
            echo ""
            echo "This is expected before publication. See docs/release-process.md."
            echo ""
            echo "Common causes:"
            echo "- Unresolved REPOSITORY_URL, RELEASE_TAG, or CANONICAL_PAPER_URL placeholders"
            echo "- No licence selected (docs/license-options.md)"
            echo "- Stale baseline reports (run: make baseline)"
            echo "- Paper references pointing at paths that do not exist"
          } >> "$GITHUB_STEP_SUMMARY"
